<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0408">
<title>ENCONTRO!!</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0408;font-family:'Press Start 2P',monospace;}

/* ROOT: fill entire viewport */
#root{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
}

/* GAME AREA: fills all space above controls */
#game-area{
  position:relative;
  flex:1 1 auto;
  overflow:hidden;
  background:#000;
}
canvas{
  position:absolute;top:0;left:0;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:6px 8px;pointer-events:none;z-index:2;}
.hw{display:flex;flex-direction:column;gap:3px;}
.hl{color:#fff;font-size:6px;text-shadow:1px 1px #000;}
.hb{width:85px;height:10px;background:#111;border:1.5px solid #fff;}
.hf{height:100%;transition:width .1s;}
#tbox{text-align:center;}
#timer{color:#ffe;font-size:9px;text-shadow:1px 1px #000;}
#plbl{color:#aaa;font-size:6px;margin-top:2px;}

/* Phase title */
#ptitle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#ffe;font-size:12px;text-shadow:0 0 16px #fff,2px 2px #000;
  z-index:5;pointer-events:none;opacity:0;transition:opacity .5s;
  text-align:center;line-height:1.7;width:90%;}

/* Combo */
#combo{position:absolute;right:10px;top:52px;color:#ffe44d;font-size:9px;
  text-shadow:0 0 8px #ffe44d,1px 1px #000;pointer-events:none;opacity:0;transition:opacity .3s;}

/* Overlay */
#overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:rgba(0,0,0,.9);z-index:20;padding:20px;
}
#overlay h1{color:#ff69b4;font-size:14px;text-align:center;line-height:1.9;
  text-shadow:0 0 12px #ff69b4;margin-bottom:12px;}
#overlay p{color:#fff;font-size:7px;text-align:center;line-height:2.4;margin-bottom:20px;}
.obtn{background:#ff69b4;color:#000;border:none;padding:14px 28px;
  font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;
  box-shadow:0 4px 0 #a0205a;border-radius:2px;}

/* CONTROLS: fixed height at bottom */
#controls{
  flex:0 0 auto;
  width:100%;
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;
  background:#050205;
  border-top:2px solid #2a0a2a;
  /* ensure safe area on iPhone */
  padding-bottom:max(8px, env(safe-area-inset-bottom));
}

/* D-pad */
#dpad{position:relative;width:110px;height:110px;flex-shrink:0;}
.db{
  position:absolute;
  background:#180a18;border:2px solid #3a1a3a;
  display:flex;align-items:center;justify-content:center;
  color:#cc66cc;font-size:15px;border-radius:4px;
  width:34px;height:34px;
  transition:background .06s,transform .06s;
  -webkit-user-select:none;
}
.db:active,.db.on{background:#ff69b4;border-color:#ff89d4;color:#000;transform:scale(.93);}
#bl{left:0;top:38px;}
#br{right:0;top:38px;}
#bu{left:38px;top:0;}
#bd{left:38px;bottom:0;}
#dpad::after{
  content:'';position:absolute;left:38px;top:38px;
  width:34px;height:34px;background:#0c050c;
  border-radius:50%;border:2px solid #1a0a1a;
}

/* Action buttons */
#abtn{display:flex;gap:12px;flex-shrink:0;}
.ab{
  width:58px;height:58px;border-radius:50%;
  border:2.5px solid #444;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;color:#eee;background:#180a18;
  font-family:'Press Start 2P',monospace;text-align:center;line-height:1.3;
  transition:background .06s,transform .06s;
  -webkit-user-select:none;
}
.ab:active,.ab.on{background:#ff69b4;border-color:#ff89d4;color:#000;transform:scale(.93);}
#bj{border-color:#44aaff;color:#44aaff;}
#ba{border-color:#ff69b4;color:#ff69b4;}

#bbar{display:none;align-items:flex-end;flex-direction:column;gap:3px;}
</style>
</head>

// ── ANIM ─────────────────────────────────────────────────
function Anim(keys,fps,loop){
  this.keys=keys; this.fps=fps;
  this.loop=(loop===false)?false:true;
  this.t=0; this.fi=0; this.done=false;
}
Anim.prototype.update=function(dt){
  if(this.done&&!this.loop)return;
  this.t+=dt; var spf=1/this.fps;
  while(this.t>=spf){
    this.t-=spf;
    if(this.fi<this.keys.length-1)this.fi++;
    else if(this.loop)this.fi=0;
    else{this.done=true;break;}
  }
};
Anim.prototype.reset=function(){this.t=0;this.fi=0;this.done=false;};
Anim.prototype.w=function(){var m=META[this.keys[this.fi]];return m?m[3]:64;};
Anim.prototype.h=function(){var m=META[this.keys[this.fi]];return m?m[4]:64;};
Anim.prototype.draw=function(ctx,x,y,flip,alpha){
  var m=META[this.keys[this.fi]];
  if(!m)return;
  var sheet=document.getElementById('sh_'+m[0]);
  if(!sheet||!sheet.complete||!sheet.naturalWidth)return;
  flip=!!flip; alpha=(alpha!==undefined)?alpha:1;
  ctx.save(); ctx.globalAlpha=alpha; ctx.imageSmoothingEnabled=false;
  if(flip){ctx.translate(x+m[3],y);ctx.scale(-1,1);}else ctx.translate(x,y);
  ctx.drawImage(sheet,m[1],m[2],m[3],m[4],0,0,m[3],m[4]);
  ctx.restore();
};

  cv.style.width=w+'px';cv.style.height=h+'px';
  cv.style.left=Math.floor((window.innerWidth-w)/2)+'px';

var K={l:0,r:0,u:0,a:0};
var JP=false,AP=false;
function bindBtn(id,key){
  var el=document.getElementById(id);
  function on(e){e.preventDefault();if(key==='u'){JP=true;K.u=1;}else if(key==='a'){AP=true;K.a=1;}else K[key]=1;el.classList.add('on');}
  function off(e){e.preventDefault();if(key==='a')K.a=0;else if(key==='u')K.u=0;else K[key]=0;el.classList.remove('on');}
  el.addEventListener('touchstart',on,{passive:false});el.addEventListener('mousedown',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mouseup',off,{passive:false});el.addEventListener('mouseleave',off,{passive:false});
}
bindBtn('bl','l');bindBtn('br','r');bindBtn('bu','u');bindBtn('bj','u');bindBtn('ba','a');
document.addEventListener('keydown',function(e){
  if(e.code==='ArrowLeft'||e.code==='KeyA')K.l=1;
  if(e.code==='ArrowRight'||e.code==='KeyD')K.r=1;
  if(e.code==='ArrowUp'||e.code==='KeyW'){JP=true;K.u=1;}
  if(e.code==='KeyZ'||e.code==='Space')AP=true;
});
document.addEventListener('keyup',function(e){
  if(e.code==='ArrowLeft'||e.code==='KeyA')K.l=0;
  if(e.code==='ArrowRight'||e.code==='KeyD')K.r=0;
  if(e.code==='ArrowUp'||e.code==='KeyW')K.u=0;
});

function resetPl(){
  pl.anims=mkMaria(); pl.cur='idle';

  pl.alive=true;pl.face=1;pl.hp=3;pl.inv=0;pl.aT=0;pl.aC=0;

  if(!pl.anims||!pl.anims[n]||pl.cur===n)return;
  pl.cur=n; pl.anims[n].reset();

// ── SPAWN ────────────────────────────────────────────────
function spawn(type){
  var c=CFG[type];
  var x=Math.random()<.5?-c.w-10:W+10;
  // Sleeper spawns at fixed positions
  if(c.obs){ x=Math.random()*(W-160)+80; }
  return{type:type,x:x,y:GND-c.h,
    vx:c.obs?0:(x<0?c.spd:-c.spd),vy:0,
    hp:c.hp,maxHp:c.hp,alive:true,face:x<0?1:-1,
    hitT:0,w:c.w,h:c.h,anims:c.mk(),cur:c.def,cfg:c,atkCool:0,hitDealt:false};
}

function ov(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function gel(id){return document.getElementById(id);}

// ── ATTACK ───────────────────────────────────────────────
function doAtk(){
  if(!pl.anims||pl.aC>0)return;
  pl.aT=18; pl.aC=24; setA('attack');
  var fw=pl.anims.attack.w(),fh=pl.anims.attack.h();
  var reach=70;
  var ax=pl.face>0?pl.x+fw*.3:pl.x-reach;
  var ay=pl.y+fh*.1,aw=reach+fw*.4,ah=fh*.8;
  var hit=false,i,en;
  var targets=enemies.slice();
  if(boss&&boss.alive)targets.push(boss);
  for(i=0;i<targets.length;i++){
    en=targets[i];if(!en.alive)continue;
    if(ov(ax,ay,aw,ah,en.x,en.y,en.w,en.h)){
      en.hp--;en.hitT=12;hit=true;shF=4;flF=3;flC='white';
      if(en.hp<=0){
        en.alive=false;
        // Death particles
        spawnParticles(en.x+en.w/2,en.y+en.h/2,'hit');
      }
    }
  }
  if(hit){combo++;cT=90;var c=gel('combo');c.textContent='COMBO x'+combo;c.style.opacity='1';}
}

function pHit(){
  if(pl.inv>0)return;
  pl.hp--;
  pl.inv=70;
  shF=8;flF=5;flC='#f00';
  gel('php').style.width=Math.max(0,pl.hp/pl.maxHp*100)+'%';
  if(pl.hp<=0){
    pl.alive=false;clearInterval(tInt);gst='dead';
    setTimeout(function(){showOv('GAME OVER','Maria não chegou ao encontro...','Tentar Novamente');},800);
  }
}

// ── PARTICLES ────────────────────────────────────────────
function spawnParticles(x,y,type){
  var i,colors=type==='hit'?['#ff4','#fa0','#f80']:['#aef','#8cf','#fff'];
  for(i=0;i<8;i++){
    particles.push({x:x,y:y,
      vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4-1,
      life:25,maxLife:25,col:colors[Math.floor(Math.random()*colors.length)]});
  }
}

function startTimer(){
  if(tInt)clearInterval(tInt);timer=15;
  gel('timer').textContent='00:15';
  tInt=setInterval(function(){
    if(gst!=='playing')return;
    timer--;
    gel('timer').textContent='00:'+(timer<10?'0':'')+timer;
    if(timer<=0){clearInterval(tInt);nextPhase();}
  },1000);
}
function nextPhase(){
  if(phase<2){
    var nextPhaseIdx=phase+1;
    phase=nextPhaseIdx;enemies=[];boss=null;spT=999;bossUp=false;
    var csKey='phase'+nextPhaseIdx;
    gst='cutscene';
    startCutscene(csKey,function(){
      gst='transition';
      showPT(PHASES[phase].name,function(){gst='playing';startTimer();});
    });
  } else {
    gst='cutscene';
    startCutscene('win',function(){
      gst='win';
      showOv('💕 YOU WIN!','Milton Nascimento ao fundo... 🎵','Jogar Novamente');
    });

}

  g.addColorStop(0,'#140820');g.addColorStop(1,'#3d0c38');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#220d3a';ctx.fillRect(0,80,W,GND-80);
  ctx.fillStyle='#2d1050';ctx.fillRect(0,80,W,14);
  var i;
  for(i=0;i<3;i++){
    ctx.fillStyle='#ffe8aa';ctx.fillRect(16+i*130,94,88,50);
    ctx.fillStyle='#ff9eb5';ctx.beginPath();ctx.arc(60+i*130,108,10,Math.PI,0);ctx.fill();
    ctx.fillStyle='#aacce8';ctx.beginPath();ctx.arc(60+i*130,100,8,Math.PI,0);ctx.fill();
    ctx.fillStyle='#c8922a';ctx.beginPath();
    ctx.moveTo(60+i*130,116);ctx.lineTo(53+i*130,107);ctx.lineTo(67+i*130,107);
    ctx.closePath();ctx.fill();
  }
  ctx.shadowColor='#ff69b4';ctx.shadowBlur=12;ctx.fillStyle='#ff69b4';
  ctx.font='bold 7px monospace';ctx.fillText('* SORVETES DA PERDICAO *',20,40);
  ctx.shadowBlur=0;
  ctx.fillStyle='#e0d0b4';ctx.fillRect(0,GND,W,H-GND);
  ctx.fillStyle='#ccc0a0';for(i=0;i<7;i++)ctx.fillRect(i*60,GND,2,H-GND);
  ctx.fillStyle='#555';ctx.fillRect(0,GND,W,2);
}
function bgStreet(){
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#060610');g.addColorStop(1,'#101028');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fffde8';ctx.shadowColor='#fffde8';ctx.shadowBlur=16;
  ctx.beginPath();ctx.arc(340,28,12,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  var blds=[[0,55,58],[65,42,70],[140,68,62],[208,44,82],[295,60,55],[350,40,52]];
  var bi,b,r,c;

    b=blds[bi];ctx.fillStyle='#080812';ctx.fillRect(b[0],GND-b[1]-55,b[2],b[1]+57);
    ctx.fillStyle='#ffe090';
    for(r=0;r<3;r++)for(c=0;c<3;c++)
      if((b[0]+r+c)%3!==0)ctx.fillRect(b[0]+5+c*(b[2]/4),GND-b[1]-45+r*14,6,8);
  }
  ctx.fillStyle='#181818';ctx.fillRect(0,GND,W,H-GND);
  ctx.fillStyle='#252525';ctx.fillRect(0,GND,W,2);
  ctx.fillStyle='#ffe090';ctx.globalAlpha=.25;
  var i;for(i=0;i<6;i++)ctx.fillRect(i*68,GND+8,38,4);

}
function bgKitchen(){
  ctx.fillStyle='#eee8d6';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#d8d0bc';ctx.lineWidth=.7;
  var r,c;for(r=0;r<=9;r++)for(c=0;c<=14;c++)ctx.strokeRect(c*28,r*28,28,28);
  ctx.fillStyle='#7a5810';ctx.fillRect(0,30,W,55);
  var i,j;
  for(i=0;i<5;i++){
    ctx.fillStyle='#9a7418';ctx.fillRect(i*84+3,33,76,48);
    ctx.fillStyle='#c09a30';ctx.fillRect(i*84+8,36,66,38);
    ctx.fillStyle='#777';ctx.beginPath();ctx.arc(i*84+42,54,4,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#ddd8c8';ctx.fillRect(0,GND-2,W,12);
  ctx.fillStyle='#b8a880';ctx.fillRect(0,GND+8,W,H);
  for(i=0;i<5;i++)for(j=0;j<3;j++){

// ── UPDATE ───────────────────────────────────────────────
function update(dt){
  if(gst!=='playing')return;
  if(!pl.anims)return;

  // Player input
  if(K.l){pl.vx=-2.2;pl.face=-1;}
  else if(K.r){pl.vx=2.2;pl.face=1;}
  else pl.vx*=0.72;
  if(JP&&pl.grnd){pl.vy=-10;pl.grnd=false;}JP=false;
  if(AP){doAtk();}AP=false;

  // Player anim
  if(pl.aT>0){pl.aT--;setA('attack');}
  else if(!pl.grnd)setA('jump');
  else if(pl.vx>0.3||pl.vx<-0.3)setA('walk');
  else setA('idle');
  pl.anims[pl.cur].update(dt);

  // Player physics
  pl.vy+=0.5;pl.x+=pl.vx;pl.y+=pl.vy;
  var pw=pl.anims[pl.cur].w(),ph=pl.anims[pl.cur].h();
  if(pl.y+ph>=GND){pl.y=GND-ph;pl.vy=0;pl.grnd=true;}
  if(pl.x<0)pl.x=0;if(pl.x>W-pw)pl.x=W-pw;
  if(pl.aC>0)pl.aC--;if(pl.inv>0)pl.inv--;
  if(cT>0)cT--;else{gel('combo').style.opacity='0';combo=0;}
  if(shF>0)shF--;if(flF>0)flF--;

  // Spawn
  spT++;
  var ph2=PHASES[phase];
  if(spT>=ph2.si&&enemies.filter(function(e){return e.alive&&!e.cfg.obs;}).length<2){
    enemies.push(spawn(ph2.min));spT=0;
  }
  // Occasional sleeper obstacle in phase 2
  if(ph2.obs&&Math.random()<0.003&&!enemies.find(function(e){return e.type===ph2.obs&&e.alive;})){
    enemies.push(spawn(ph2.obs));
  }
  // Boss in phase 3 at 15s
  if(ph2.boss&&!bossUp&&timer<=15){
    bossUp=true;
    boss=spawn(ph2.boss);
    boss.x=W-boss.w-10;boss.y=GND-boss.h;boss.vx=-boss.cfg.spd;boss.face=-1;
  }

  // Update enemies
  var all=enemies.slice();
  if(boss&&boss.alive)all.push(boss);
  var i,en,dist,alive=[];

  for(i=0;i<all.length;i++){
    en=all[i];if(!en.alive)continue;
    en.hitT=en.hitT>0?en.hitT-1:0;
    en.anims[en.cur].update(dt);

    if(!en.cfg.obs){
      // dist: real distance between centers
      var ecx=en.x+en.w/2, pcx=pl.x+pw/2;
      dist=ecx-pcx; if(dist<0)dist=-dist;
      // face toward player
      en.face=ecx<pcx?1:-1;

      var atkAnim=en.cfg.atk;
      var walkAnim=en.type==='bum'?'run':'walk';

      if(en.cur===atkAnim){
        // Currently attacking
        en.vx=0;
        en.anims[atkAnim].update(0); // already updated above, just check
        if(en.anims[atkAnim].done){
          // Attack finished — cooldown before next attack
          en.cur=walkAnim;
          en.atkCool=50;
        }
        // Damage window: frame 2 of attack animation
        if(en.anims[atkAnim].fi===2&&!en.hitDealt&&pl.inv<=0&&dist<en.cfg.atkRange+15){
          en.hitDealt=true;
          pHit();
        }
      } else {
        // Not attacking
        if(en.atkCool>0){
          en.atkCool--;
          // Walk slowly while cooling
          en.vx=ecx<pcx?en.cfg.spd*0.3:-en.cfg.spd*0.3;
        } else if(dist<en.cfg.atkRange){
          // Close enough — start attack
          en.vx=0;
          en.cur=atkAnim;
          en.anims[atkAnim].reset();
          en.hitDealt=false; // reset hit flag for this attack
        } else {
          // Chase player
          en.vx=ecx<pcx?en.cfg.spd:-en.cfg.spd;
        }
      }
    }

    en.x+=en.vx;en.vy+=0.35;en.y+=en.vy;
    if(en.y+en.h>=GND){en.y=GND-en.h;en.vy=0;}
    // Keep on screen
    if(!en.cfg.obs){if(en.x<-en.w-5)en.x=-en.w-5;if(en.x>W+5)en.x=W+5;}
  }

  for(i=0;i<enemies.length;i++)if(enemies[i].alive)alive.push(enemies[i]);
  enemies=alive;
  if(boss&&!boss.alive)boss=null;

  // Particles
  var palive=[],p;
  for(i=0;i<particles.length;i++){
    p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;
    if(p.life>0)palive.push(p);
  }
  particles=palive;

  // HUD boss bar
  if(boss){
    gel('bhp').style.width=Math.max(0,boss.hp/boss.maxHp*100)+'%';
    gel('bbar').style.display='flex';
  } else {
    gel('bbar').style.display='none';
  }
}

// ── DRAW ─────────────────────────────────────────────────
function drawEnt(en){
  var flip=en.face<0;
  en.anims[en.cur].draw(ctx,en.x,en.y,flip);
  if(en.hitT>0){
    ctx.save();ctx.globalAlpha=0.55;ctx.fillStyle='#fff';
    ctx.fillRect(en.x,en.y,en.w,en.h);ctx.restore();
    en.anims[en.cur].draw(ctx,en.x,en.y,flip,0.4);
  }
  // HP bar
  var bw=Math.max(en.w,30);
  ctx.fillStyle='#222';ctx.fillRect(en.x,en.y-8,bw,5);
  ctx.fillStyle=en.cfg.boss?'#f44':'#fa0';
  ctx.fillRect(en.x,en.y-8,bw*(en.hp/en.maxHp),5);
  ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=.5;
  ctx.strokeRect(en.x,en.y-8,bw,5);
}

function draw(){
  ctx.save();
  if(shF>0)ctx.translate((Math.random()-.5)*5,(Math.random()-.5)*3);
  PHASES[phase].bg();
  if(flF>0){ctx.save();ctx.globalAlpha=.22;ctx.fillStyle=flC;ctx.fillRect(0,0,W,H);ctx.restore();}

  var i;
  for(i=0;i<enemies.length;i++)if(enemies[i].alive)drawEnt(enemies[i]);
  if(boss&&boss.alive)drawEnt(boss);

  // Maria
  if(pl.alive&&pl.anims){
    var al=pl.inv>0&&Math.floor(pl.inv/4)%2===0?.15:1;
    pl.anims[pl.cur].draw(ctx,pl.x,pl.y,pl.face<0,al);
  }

  // Particles
  var p;
  for(i=0;i<particles.length;i++){
    p=particles[i];
    ctx.save();ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-2,p.y-2,4,4);
    ctx.restore();
  }
  ctx.restore();
}

// ── LOOP ─────────────────────────────────────────────────
function loop(ts){
  var dt=ts-pt;if(dt>50)dt=50;dt/=1000;pt=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

function startCutscene(key, onDone) {

  csState.onDone = onDone;
  csState.tick   = 0;
  csState.charIdx= 0;
  document.getElementById('cs-panel').style.display = 'flex';
  renderCutscene();
}

function renderCutscene() {
  var line = csState.lines[csState.idx];
  var panel= document.getElementById('cs-panel');
  var name = document.getElementById('cs-name');
  var text = document.getElementById('cs-text');
  var avatar = document.getElementById('cs-avatar');

  if(line.who === 'narr') {
    name.textContent = '';
    avatar.textContent = '📖';
    avatar.style.background = '#1a0a2a';
    panel.style.background = 'rgba(10,4,20,0.97)';
    text.style.color = '#ffe';
  } else if(line.who === 'maria') {
    name.textContent = line.name;
    avatar.textContent = '💁';
    avatar.style.background = '#2a0a3a';
    panel.style.background = 'rgba(20,5,35,0.97)';
    text.style.color = '#ffccee';
  } else if(line.who === 'irmao') {
    name.textContent = line.name;
    avatar.textContent = '📱';
    avatar.style.background = '#0a1a2a';
    panel.style.background = 'rgba(5,15,30,0.97)';
    text.style.color = '#ccddff';
  } else if(line.who === 'thal') {
    name.textContent = line.name;
    avatar.textContent = '🧑';
    avatar.style.background = '#1a2a0a';
    panel.style.background = 'rgba(10,20,5,0.97)';
    text.style.color = '#ccffcc';
  }

  // Typewriter
  csState.charIdx = 0;
  csState.tick = 0;
  typewriterTick();
}

function typewriterTick() {
  var line = csState.lines[csState.idx];
  var full = line.text;
  var text = document.getElementById('cs-text');
  var shown = full.substring(0, csState.charIdx);
  text.textContent = shown.replace(/\n/g,'\n');
  if(csState.charIdx < full.length) {
    csState.charIdx++;
    setTimeout(typewriterTick, 30);
  }
}

function advanceCutscene() {
  var line = csState.lines[csState.idx];
  // If still typing, skip to end
  if(csState.charIdx < line.text.length) {
    csState.charIdx = line.text.length;
    document.getElementById('cs-text').textContent = line.text.replace(/\\n/g,'\n');
    return;
  }
  csState.idx++;
  if(csState.idx >= csState.lines.length) {
    // Done
    csState.active = false;
    document.getElementById('cs-panel').style.display = 'none';
    if(csState.onDone) csState.onDone();
  } else {
    csState.charIdx = 0;
    renderCutscene();
  }
}

// Tap/click to advance cutscene
document.getElementById('cs-panel').addEventListener('click', function(e){
  e.preventDefault();
  if(csState.active) advanceCutscene();
});
document.getElementById('cs-panel').addEventListener('touchend', function(e){
  e.preventDefault();
  if(csState.active) advanceCutscene();
});
