<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Uma Perguntinha...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* animated gradient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8eaf6, #e0f7fa, #fce4ec);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            z-index: -2;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* floating hearts background */
        .hearts-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.15;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.15; }
            90%  { opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            text-align: center;
            padding: 2rem 1.5rem;
            max-width: 420px;
            width: 90%;
            position: relative;
        }

        .emoji-top {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-12px); }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #4a1942;
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 1rem;
            color: #7b4b7e;
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .question {
            font-size: 1.3rem;
            font-weight: 600;
            color: #6a1b5e;
            margin-bottom: 2.5rem;
            line-height: 1.4;
        }

        .buttons-area {
            position: relative;
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }

        .btn {
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 50px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }

        .btn-sim {
            background: linear-gradient(135deg, #e91e63, #f06292);
            color: white;
            box-shadow: 0 4px 20px rgba(233, 30, 99, 0.4);
        }

        .btn-sim:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 25px rgba(233, 30, 99, 0.5);
        }

        .btn-sim:active {
            transform: scale(0.95);
        }

        .btn-nao {
            background: linear-gradient(135deg, #78909c, #90a4ae);
            color: white;
            box-shadow: 0 4px 15px rgba(120, 144, 156, 0.3);
            position: absolute;
            z-index: 10;
            transition: transform 0.15s ease-out, box-shadow 0.15s;
        }

        .sass-message {
            margin-top: 1rem;
            font-size: 1rem;
            color: #ad1457;
            font-weight: 600;
            min-height: 1.5rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== SUCCESS SCREEN ===== */
        .success-screen {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .success-screen.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .success-emoji {
            font-size: 5rem;
            animation: celebrate 0.5s ease infinite alternate;
        }

        @keyframes celebrate {
            from { transform: scale(1) rotate(-5deg); }
            to   { transform: scale(1.1) rotate(5deg); }
        }

        .success-screen h1 {
            font-size: 2rem;
            color: #e91e63;
            margin: 1rem 0;
        }

        .success-screen p {
            font-size: 1.1rem;
            color: #6a1b5e;
            line-height: 1.6;
        }

        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* responsive tweaks */
        @media (max-height: 650px) {
            .emoji-top { font-size: 3rem; }
            h1 { font-size: 1.3rem; }
            .buttons-area { height: 160px; }
        }
    </style>
</head>
<body>

<!-- floating hearts -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- main screen -->
<div class="container" id="mainScreen">
    <div class="emoji-top">&#x1F633;</div>
    <h1>Oi Maria...</h1>
    <p class="subtitle">eu queria te perguntar uma coisa<br>mas n&atilde;o sei muito bem como perguntar</p>
    <p class="question">Sai comigo de novo? &#x1F97A;</p>

    <div class="buttons-area" id="buttonsArea">
        <button class="btn btn-sim" id="btnSim" onclick="aceitou()">
            Sim! &#x1F496;
        </button>
        <button class="btn btn-nao" id="btnNao">
            N&atilde;o &#x1F614;
        </button>
    </div>

    <div class="sass-message" id="sassMessage"></div>
</div>

<!-- success screen -->
<div class="success-screen" id="successScreen">
    <div class="success-emoji">&#x1F60E;</div>
    <h1>Boa escolha</h1>
    <p>
        Sabia que ia aceitar
    </p>
    <p style="margin-top:1.5rem; font-size: 2rem;">&#x1F91D;</p>
    <p style="margin-top:1rem; font-size: 0.9rem; color: #b07ab5;">
        Te chamo pra combinar
    </p>
</div>

<!-- confetti container -->
<div class="confetti-container" id="confettiContainer"></div>

<script type="module">
    // =============================================
    //  FIREBASE CONFIG - COLE SUA CONFIG AQUI!
    // =============================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, setDoc, updateDoc, increment, getDoc }
        from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyARpBQxh2x5AMHewHJUC7PCsRv9eDUZtKY",
        authDomain: "maria-71d99.firebaseapp.com",
        projectId: "maria-71d99",
        storageBucket: "maria-71d99.firebasestorage.app",
        messagingSenderId: "444834667967",
        appId: "1:444834667967:web:629f74312badab432ad50a"
    };

    let db = null;
    let firebaseReady = false;

    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        firebaseReady = true;
        console.log("Firebase conectado!");
    } catch (e) {
        console.warn("Firebase não configurado ainda. Clicks serão logados no console.", e);
    }

    // =============================================
    //  TRACKING DE CLICKS
    // =============================================
    const docRef = firebaseReady ? doc(db, "respostas", "maria") : null;

    // Initialize document if needed
    async function initDoc() {
        if (!firebaseReady) return;
        try {
            const snap = await getDoc(docRef);
            if (!snap.exists()) {
                await setDoc(docRef, {
                    clicks_nao: 0,
                    clicks_sim: 0,
                    respondeu_sim: false,
                    ultima_visita: new Date().toISOString(),
                    tentativas_fuga: []
                });
            } else {
                await updateDoc(docRef, {
                    ultima_visita: new Date().toISOString()
                });
            }
        } catch (e) {
            console.warn("Erro ao init doc:", e);
        }
    }
    initDoc();

    async function trackClick(tipo) {
        const timestamp = new Date().toISOString();
        console.log(`[TRACK] ${tipo} @ ${timestamp}`);

        if (!firebaseReady) return;

        try {
            if (tipo === "nao") {
                await updateDoc(docRef, {
                    clicks_nao: increment(1),
                });
            } else if (tipo === "sim") {
                await updateDoc(docRef, {
                    clicks_sim: increment(1),
                    respondeu_sim: true,
                    hora_sim: timestamp
                });
            }
        } catch (e) {
            console.warn("Erro ao trackear:", e);
        }
    }

    // expose to global scope
    window.trackClick = trackClick;

    // =============================================
    //  BOTÃO "NÃO" - CAOS MODE
    // =============================================
    const btnNao = document.getElementById("btnNao");
    const buttonsArea = document.getElementById("buttonsArea");
    const sassMessage = document.getElementById("sassMessage");

    let naoClicks = 0;
    let currentScale = 1;

    const sassMessages = [
        "Tem certeza? 🤔",
        "Clica de novo, vai... 😏",
        "Olha, eu sou legal, juro! 🥺",
        "O botão tá fugindo de você 😂",
        "Acho que o destino tá tentando dizer algo... 💫",
        "Desiste do não! 😤",
        "Tá difícil né? Aceita logo! 🙃",
        "Esse botão tem vida própria! 🏃",
        "Eu fiz esse site inteiro só pra te perguntar isso 🤓",
        "Última chance pro não... será? 👀",
        "Ok, o botão já era. Aceita logo vai ❤️",
    ];

    function getRandomPosition() {
        const area = buttonsArea.getBoundingClientRect();
        const btnRect = btnNao.getBoundingClientRect();
        const btnW = btnRect.width;
        const btnH = btnRect.height;

        // Use the whole viewport on mobile for extra chaos
        const maxX = window.innerWidth - btnW - 20;
        const maxY = window.innerHeight - btnH - 20;

        const x = Math.random() * maxX + 10;
        const y = Math.random() * maxY + 10;

        return { x, y };
    }

    function escapeButton() {
        naoClicks++;
        trackClick("nao");

        // Shrink the button
        currentScale = Math.max(0.2, currentScale - 0.07);
        btnNao.style.transform = `scale(${currentScale})`;

        // Move to random position (escape the area!)
        if (naoClicks >= 3) {
            btnNao.style.position = "fixed";
            const pos = getRandomPosition();
            btnNao.style.left = pos.x + "px";
            btnNao.style.top = pos.y + "px";
        } else {
            const area = buttonsArea.getBoundingClientRect();
            const offsetX = (Math.random() - 0.5) * area.width * 0.8;
            const offsetY = (Math.random() - 0.5) * area.height * 0.8;
            btnNao.style.position = "absolute";
            btnNao.style.left = `calc(50% + ${offsetX}px)`;
            btnNao.style.top = `calc(50% + ${offsetY}px)`;
        }

        // Show sass message
        const msgIndex = Math.min(naoClicks - 1, sassMessages.length - 1);
        sassMessage.textContent = sassMessages[msgIndex];

        // Make "Sim" button grow
        const simScale = 1 + (naoClicks * 0.06);
        document.getElementById("btnSim").style.transform = `scale(${simScale})`;

        // After many tries, make it nearly impossible
        if (naoClicks > 10) {
            btnNao.style.opacity = Math.max(0.1, 1 - (naoClicks - 10) * 0.1);
        }

        // Vibrate on mobile if available
        if (navigator.vibrate) {
            navigator.vibrate(50);
        }
    }

    // Mouse events
    btnNao.addEventListener("mouseenter", escapeButton);
    btnNao.addEventListener("touchstart", (e) => {
        e.preventDefault();
        escapeButton();
    }, { passive: false });
    // Also catch actual clicks just in case
    btnNao.addEventListener("click", (e) => {
        e.preventDefault();
        escapeButton();
    });

    // =============================================
    //  BOTÃO "SIM" - CELEBRATION!
    // =============================================
    window.aceitou = function() {
        trackClick("sim");

        document.getElementById("mainScreen").style.display = "none";
        document.getElementById("successScreen").classList.add("active");

        // Confetti!
        launchConfetti();

        // Vibrate celebration
        if (navigator.vibrate) {
            navigator.vibrate([100, 50, 100, 50, 200]);
        }
    };

    function launchConfetti() {
        const container = document.getElementById("confettiContainer");
        const colors = ["#e91e63", "#f06292", "#ce93d8", "#ff80ab",
                        "#f48fb1", "#ffab91", "#fff176", "#80deea"];

        for (let i = 0; i < 80; i++) {
            setTimeout(() => {
                const confetti = document.createElement("div");
                confetti.className = "confetti";
                confetti.style.left = Math.random() * 100 + "%";
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = (Math.random() * 8 + 5) + "px";
                confetti.style.height = (Math.random() * 8 + 5) + "px";
                confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
                confetti.style.animationDuration = (Math.random() * 2 + 1.5) + "s";
                confetti.style.animationDelay = "0s";
                container.appendChild(confetti);

                setTimeout(() => confetti.remove(), 4000);
            }, i * 30);
        }
    }

    // =============================================
    //  FLOATING HEARTS BACKGROUND
    // =============================================
    const heartsBg = document.getElementById("heartsBg");
    const heartEmojis = ["💕", "💗", "💖", "✨", "💫", "🌸"];

    function spawnHeart() {
        const heart = document.createElement("div");
        heart.className = "floating-heart";
        heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
        heart.style.left = Math.random() * 100 + "%";
        heart.style.animationDuration = (Math.random() * 6 + 6) + "s";
        heart.style.animationDelay = Math.random() * 2 + "s";
        heartsBg.appendChild(heart);

        setTimeout(() => heart.remove(), 14000);
    }

    // Spawn initial batch
    for (let i = 0; i < 8; i++) {
        setTimeout(spawnHeart, i * 500);
    }
    // Keep spawning
    setInterval(spawnHeart, 2000);
</script>

</body>
</html>
